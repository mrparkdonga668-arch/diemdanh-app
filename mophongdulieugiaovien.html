<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khởi tạo dữ liệu Giáo viên</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <h2>Công cụ tạo tài khoản Giáo viên</h2>
    <input type="text" id="tid" placeholder="Mã GV (VD: GV001)"><br><br>
    <input type="text" id="tname" placeholder="Họ tên (VD: Nguyễn Văn A)"><br><br>
    <input type="text" id="tpass" placeholder="Mật khẩu (VD: 123456)"><br><br>
    <button onclick="createTeacher()">Tạo và Lưu vào Firebase</button>

    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        async function createTeacher() {
            const id = document.getElementById('tid').value.trim();
            const name = document.getElementById('tname').value.trim();
            const pass = document.getElementById('tpass').value.trim();
            const resultDiv = document.getElementById('result');

            if(!id || !name || !pass) {
                alert("Vui lòng nhập đủ thông tin");
                return;
            }

            const FIREBASE_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app";
            
            // Mã hóa mật khẩu trước khi gửi
            const hashedPassword = CryptoJS.SHA256(pass).toString();

            const data = {
                "name": name,
                "password": hashedPassword
            };

            resultDiv.innerHTML = "⏳ Đang xử lý...";

            try {
                const response = await fetch(`${FIREBASE_URL}/teachers/${id}.json`, {
                    method: "PUT",
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    resultDiv.style.color = "green";
                    resultDiv.innerHTML = `✅ Đã tạo thành công giáo viên ${id}!<br>Mật khẩu đã mã hóa: ${hashedPassword}`;
                } else {
                    resultDiv.style.color = "red";
                    resultDiv.innerHTML = "❌ Lỗi Firebase: " + await response.text();
                }
            } catch (err) {
                resultDiv.innerHTML = "❌ Lỗi: " + err.message;
            }
        }
    </script>
</body>
</html>
