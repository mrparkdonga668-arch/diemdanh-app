<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm Danh Sinh Viên</title>
    <!-- AI Face -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <!-- Quét QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Mã hóa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background-color: #f4f4f9; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; border: 3px solid #007bff; display: none; margin: 0 auto; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; display: none; border: 3px solid #ff9800; border-radius: 10px; }
        #status { margin-top: 15px; font-weight: bold; color: red; font-size: 18px; }
        button { padding: 12px 24px; font-size: 18px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>

    <div id="pwa-popup" style="display:none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 90%; max-width: 400px; z-index: 1000; text-align: left; border: 2px solid #007bff;">
        <h4 style="margin: 0 0 10px 0; color: #007bff;">📲 Cài đặt ứng dụng</h4>
        <p id="pwa-text" style="margin: 0 0 15px 0; font-size: 14px; color: #333; line-height: 1.4;"></p>
        <div style="text-align: right;">
            <button id="btnInstall" style="display:none; margin: 0 5px 0 0; padding: 8px 15px; background: #28a745; color: white; font-size: 14px; border-radius: 5px; border:none; cursor: pointer;">Cài đặt ngay</button>
            <button onclick="closePwaPopup()" style="margin: 0; padding: 8px 15px; background: #6c757d; color: white; font-size: 14px; border-radius: 5px; border:none; cursor: pointer;">Đóng</button>
        </div>
    </div>

    <h2>Hệ thống Điểm Danh 3 Lớp</h2>
    <div id="status">Đang tải hệ thống... Vui lòng đợi.</div>
    
    <!-- Nơi hiển thị Camera Quét QR -->
    <div id="reader"></div>

    <!-- Nơi hiển thị Camera Quét Mặt -->
    <video id="video" autoplay muted playsinline></video>

    <br>
    <button id="btnStart" style="display:none;" onclick="startProcess()">1. Bắt đầu Check GPS</button>

    <script defer src="script.js"></script>
</body>
</html>
