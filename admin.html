<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GV - Hệ thống Điểm Danh (Bảo mật cao)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* CSS: Ngăn bôi đen văn bản */
        body { font-family: Arial; text-align: center; background: #eef2f7; padding: 20px; user-select: none; -webkit-user-select: none; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        #qrcode { display: flex; justify-content: center; margin-top: 20px; }
        .timer { font-size: 30px; color: red; font-weight: bold; }
        
        /* Màn hình khóa vĩnh viễn khi vi phạm */
        #lock-screen-fatal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; color: red; padding: 20px; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH KHÓA VI PHẠM -->
    <div id="lock-screen-fatal">
        <h1>⛔ TÀI KHOẢN BỊ KHÓA</h1>
        <p>Phát hiện vi phạm hoặc nhập sai mật khẩu quá 5 lần. Vui lòng liên hệ Quản trị viên.</p>
    </div>

    <!-- UI ĐĂNG NHẬP -->
    <div class="card" id="login-box">
        <h2>GIẢNG VIÊN ĐĂNG NHẬP</h2>
        <input type="text" id="tid" placeholder="Mã giảng viên (VD: GV001)" autocomplete="off">
        <input type="password" id="tpass" placeholder="Mật khẩu" autocomplete="new-password">
        <button id="btnLogin">Đăng Nhập</button>
        <p id="login-status" style="color: red; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <!-- UI QUẢN LÝ LỚP -->
    <div class="card" id="admin-panel" style="display:none;">
        <h3 id="welcome">Chào thầy</h3>
        <select id="classId"></select>
        <button id="btnOpenClass">🚀 MỞ LỚP & PHÁT QR</button>
        
        <div id="qr-area" style="display:none;">
            <div id="clock" class="timer">10:00</div>
            <div id="qrcode"></div>
            <p>Mã QR Động (Xoay 15s/lần)</p>
        </div>
    </div>

    <script>
        // SỬ DỤNG IIFE ĐỂ ĐÓNG GÓI HOÀN TOÀN LOGIC, KHÔNG LỘ RA WINDOW OBJECT
        (function() {
            "use strict";

            // --- 1. BẢO MẬT GIAO DIỆN (CHỐNG F12, CHUỘT PHẢI, DEBUGGER) ---
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || 
                   (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) || 
                   (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                }
            });
            setInterval(() => {
                (function() { return false; }['constructor']('debugger')());
            }, 1000);

            // --- 2. CẤU HÌNH & BIẾN CỤC BỘ ---
            const FB_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app";
            const SECRET_KEY = "HàngHải2026@Secure";
            const ATTEMPT_STORAGE_KEY = "KHH_ADMIN_ATTEMPT_HASH";
            const MAX_FAILS = 5;

            let qrcode = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });
            let serverTimeOffset = 0;

            // --- 3. QUẢN LÝ SỐ LẦN SAI (MÃ HÓA AES CRYPTO-JS) ---
            function getFailCount() {
                try {
                    let enc = localStorage.getItem(ATTEMPT_STORAGE_KEY);
                    if (!enc) return 0;
                    let decrypted = CryptoJS.AES.decrypt(enc, SECRET_KEY).toString(CryptoJS.enc.Utf8);
                    if (!decrypted) throw new Error("Tampered"); // Sửa đổi dữ liệu mã hóa -> Khóa
                    return parseInt(decrypted) || 0;
                } catch (e) {
                    return MAX_FAILS; // Phát hiện cố tình gian lận -> ép max lỗi
                }
            }

            function incrementFailCount() {
                let current = getFailCount() + 1;
                let enc = CryptoJS.AES.encrypt(current.toString(), SECRET_KEY).toString();
                localStorage.setItem(ATTEMPT_STORAGE_KEY, enc);
                if (current >= MAX_FAILS) lockSystemFatal();
                return current;
            }

            function resetFailCount() {
                let enc = CryptoJS.AES.encrypt("0", SECRET_KEY).toString();
                localStorage.setItem(ATTEMPT_STORAGE_KEY, enc);
            }

            function lockSystemFatal() {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('lock-screen-fatal').style.display = 'flex';
                throw new Error("System Locked"); // Dừng thực thi JS
            }

            // Check số lần sai ngay khi load trang
            if (getFailCount() >= MAX_FAILS) {
                window.onload = lockSystemFatal;
                return;
            }

            // --- 4. ĐỒNG BỘ THỜI GIAN SERVER ---
            async function syncTime() {
                try {
                    const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh');
                    const data = await res.json();
                    serverTimeOffset = new Date(data.datetime).getTime() - Date.now();
                } catch (e) { console.warn("Time sync warning, using local time"); }
            }
            syncTime();
            function getNow() { return Date.now() + serverTimeOffset; }

            // --- 5. LOGIC ĐĂNG NHẬP ---
            document.getElementById("btnLogin").addEventListener("click", async function() {
                let btn = this;
                const idInput = document.getElementById('tid').value.trim();
                const passInput = document.getElementById('tpass').value;
                const statusTxt = document.getElementById('login-status');

                if(!idInput || !passInput) {
                    statusTxt.innerText = "Vui lòng nhập đủ thông tin!";
                    return;
                }

                btn.disabled = true;
                btn.innerText = "Đang xử lý...";
                statusTxt.innerText = "";

                try {
                    const passHashed = CryptoJS.SHA256(passInput).toString();
                    const res = await fetch(`${FB_URL}/teachers/${idInput}.json`);
                    const data = await res.json();

                    if (data && data.password === passHashed) {
                        resetFailCount(); // Đăng nhập đúng -> Hủy lỗi
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('admin-panel').style.display = 'block';
                        document.getElementById('welcome').innerText = "Thầy: " + data.name;
                        loadTeacherClasses(idInput);
                    } else {
                        let fails = incrementFailCount();
                        statusTxt.innerText = `Sai thông tin! (Cảnh báo: ${fails}/${MAX_FAILS})`;
                    }
                } catch(e) {
                    statusTxt.innerText = "Lỗi kết nối mạng!";
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Đăng Nhập";
                }
            });

            async function loadTeacherClasses(teacherId) {
                try {
                    const res = await fetch(`${FB_URL}/classes.json`);
                    const allClasses = await res.json();
                    const select = document.getElementById('classId');
                    select.innerHTML = "";

                    let hasClass = false;
                    for (let id in allClasses) {
                        if (allClasses[id].teacher_id === teacherId) {
                            let opt = document.createElement('option');
                            opt.value = id;
                            opt.innerText = allClasses[id].class_name;
                            select.appendChild(opt);
                            hasClass = true;
                        }
                    }
                    if(!hasClass) {
                        select.innerHTML = "<option value=''>-- Không có lớp nào --</option>";
                        document.getElementById('btnOpenClass').disabled = true;
                    }
                } catch(e) { alert("Lỗi tải danh sách lớp!"); }
            }

            // --- 6. LOGIC MỞ LỚP & GPS ---
            document.getElementById("btnOpenClass").addEventListener("click", function() {
                const cid = document.getElementById('classId').value;
                if(!cid) return;

                let statusDiv = document.getElementById('qr-area');
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = "📍 Đang lấy tọa độ Giảng viên (Yêu cầu bật GPS)...";
                this.disabled = true; // Chống click nhiều lần

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const startTime = getNow();
                    const salt = CryptoJS.lib.WordArray.random(16).toString();
                    const teacherName = document.getElementById('welcome').innerText.replace("Thầy: ", "");

                    const session = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        startTime: startTime,
                        salt: salt,
                        teacher_name: teacherName
                    };

                    try {
                        await fetch(`${FB_URL}/active_sessions/${cid}.json`, { 
                            method: 'PUT', 
                            body: JSON.stringify(session) 
                        });

                        document.getElementById('qr-area').innerHTML = `
                            <div id="clock" class="timer">10:00</div>
                            <div id="qrcode" style="display:flex; justify-content:center; margin-top:15px;"></div>
                            <p style="margin-top:10px; font-weight:bold; color:#007bff;">Mã QR Động (Xoay 15s/lần)</p>
                            <p style="font-size:12px; color:gray;">📍 Tọa độ phát: ${session.lat.toFixed(5)}, ${session.lon.toFixed(5)}</p>
                        `;
                        
                        // Re-init QRCode sau khi chèn HTML
                        qrcode = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });

                        // Bắt đầu vòng lặp QR
                        const timerInterval = setInterval(() => {
                            const now = getNow();
                            const elapsed = now - startTime;
                            const LIMIT = 600000; // 10 phút

                            const clock = document.getElementById('clock');
                            
                            if (elapsed >= LIMIT) { 
                                clearInterval(timerInterval);
                                if(clock) clock.innerText = "HẾT GIỜ";
                                document.getElementById('qrcode').innerHTML = "<h3 style='color:red;'>ĐÃ ĐÓNG ĐIỂM DANH</h3>";
                                document.getElementById('btnOpenClass').disabled = false; // Cho phép mở lại
                                return;
                            }

                            // Đếm ngược
                            if(clock) {
                                let remaining = Math.floor((LIMIT - elapsed) / 1000);
                                let m = Math.floor(remaining / 60);
                                let s = remaining % 60;
                                clock.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                            }
                            
                            // Phát sinh token 15s/lần
                            let timeBlock = Math.floor(now / 15000);
                            let token = CryptoJS.HmacSHA256(`${cid}_${timeBlock}_${salt}`, SECRET_KEY).toString();
                            qrcode.makeCode(token);
                        }, 1000);

                    } catch (e) {
                        alert("Lỗi mạng khi mở lớp: " + e.message);
                        document.getElementById('btnOpenClass').disabled = false;
                    }
                }, (err) => {
                    alert("Lỗi GPS: Phải cấp quyền vị trí mới có thể mở lớp điểm danh!");
                    document.getElementById('btnOpenClass').disabled = false;
                    statusDiv.innerHTML = "<span style='color:red;'>Không lấy được GPS. Mở lớp thất bại.</span>";
                }, { enableHighAccuracy: true });
            });

        })();
    </script>
</body>
</html>
