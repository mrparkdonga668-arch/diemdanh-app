<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Sinh Trắc Học Thiết Bị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        
        /* Camera Container */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ccc;
            background: #000;
            display: none;
        }

        #video { width: 100%; display: block; transform: scaleX(-1); }

        #cam-instruction {
            position: absolute;
            top: 15px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
        }

        #face-mask {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; 
            height: 260px;
            border: 3px solid #28a745;
            border-radius: 50% / 40%;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { border-color: #28a745; box-shadow: 0 0 5px #28a745, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
            50% { border-color: #5eff8b; box-shadow: 0 0 20px #5eff8b, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
            100% { border-color: #28a745; box-shadow: 0 0 5px #28a745, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
        }

        input { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { padding: 14px; font-size: 16px; width: 90%; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #btn-reg { background: #007bff; color: white; display: none; }
        #btn-reg:disabled { background: #6c757d; cursor: not-allowed; }
        
        .btn-remove { background: #6c757d; color: white; opacity: 0.7; }

        #status-box { margin-top: 15px; padding: 20px; border-radius: 10px; display: none; line-height: 1.6; }
        .success-msg { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error-msg { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .progress-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #007bff; transform: scale(1.3); }
        .dot.done { background: #28a745; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div id="setup-ui">
            <h2 style="margin-top:0; color:#007bff;">🔧 ĐĂNG KÝ THIẾT BỊ</h2>
            <div id="ai-loading" style="color:#ff9800; font-weight:bold; margin-bottom:15px;">⏳ Đang khởi tạo AI...</div>
            
            <div class="progress-dots" id="dots-container">
                <div id="dot0" class="dot"></div>
                <div id="dot1" class="dot"></div>
                <div id="dot2" class="dot"></div>
            </div>

            <div id="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div id="cam-instruction">Sẵn sàng</div>
                <div id="face-mask"></div>
            </div>

            <input type="text" id="studentId" placeholder="Nhập Mã Sinh Viên (VD: SV001)">
            <button id="btn-reg" onclick="handleRegistration()">📸 Bắt đầu chụp mặt</button>
            <button id="btn-del" class="btn-remove" onclick="removeDevice()">🗑️ Hủy liên kết máy này</button>
        </div>

        <div id="status-box"></div>
    </div>
