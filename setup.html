<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý & Sinh Trắc Học Thiết Bị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #e9ecef; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-register { background: #007bff; color: white; display: none; }
        .btn-remove { background: #dc3545; color: white; margin-top: 10px; }
        #status-box { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-size: 14px;}
        #video { width: 100%; border-radius: 10px; border: 2px solid #007bff; margin-bottom: 15px; display: none; }
        #ai-loading { color: #ff9800; font-weight: bold; margin-bottom: 15px; }
        #countdown { font-size: 18px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔧 ĐĂNG KÝ THIẾT BỊ</h2>
        <p style="color: #666; font-size: 13px;">(Quét khuôn mặt và Gắn ID Thiết bị)</p>
        <div id="ai-loading">⏳ Đang tải AI nhận diện khuôn mặt...</div>
        <video id="video" autoplay muted playsinline></video>
        <input type="text" id="studentId" placeholder="Nhập Mã Sinh Viên (VD: SV001)">
        <button id="btn-reg" class="btn-register" onclick="registerDevice()">📸 Chụp khuôn mặt</button>
        <button class="btn-remove" onclick="removeDevice()">🗑️ Hủy liên kết</button>
        <div id="status-box"></div>
        <div id="countdown" style="display: none;"></div>
    </div>
    <script>
        const statusBox = document.getElementById("status-box");
        const video = document.getElementById("video");
        const btnReg = document.getElementById("btn-reg");
        const aiLoading = document.getElementById("ai-loading");
        const countdownElement = document.getElementById("countdown");

        const FIREBASE_BASE_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app";

        function showStatus(message, isSuccess) {
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = isSuccess ? "#d4edda" : "#f8d7da";
            statusBox.style.color = isSuccess ? "#155724" : "#721c24";
            statusBox.innerHTML = message;
        }

        // ==========================================
        // 1. TẢI MODELS VÀ MỞ CAMERA
        // ==========================================
        window.onload = async () => {
            try {
                console.log("Bắt đầu tải Models...");
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('./models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('./models')
                ]);
                console.log("Tải Models thành công!");
                startSetupCamera();
            } catch (error) {
                console.error("Lỗi khi tải Models:", error);
                aiLoading.innerHTML = "❌ Lỗi: Không thể tải dữ liệu AI (Kiểm tra thư mục models)";
                aiLoading.style.color = "red";
            }
        };

        async function startSetupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.style.display = "block";
                aiLoading.style.display = "none";
                btnReg.style.display = "inline-block";
            } catch (err) {
                aiLoading.innerHTML = "❌ Lỗi: Không thể mở Camera!";
                aiLoading.style.color = "red";
            }
        }

        // ==========================================
        // 2. QUY TRÌNH ĐĂNG KÝ ĐA GÓC ĐỘ
        // ==========================================
        let registeredDescriptors = [];
        let currentStep = 0;
        const steps = [
            { label: "Nhìn thẳng vào camera", filter: "front", duration: 3 }, // Thêm thời gian (giây)
            { label: "Quay mặt sang TRÁI một chút", filter: "left", duration: 3 },
            { label: "Quay mặt sang PHẢI một chút", filter: "right", duration: 3 }
        ];

        async function registerDevice() {
            let msv = document.getElementById("studentId").value.trim().toUpperCase();
            if(!msv) { alert("Vui lòng nhập Mã sinh viên!"); return; }
            btnReg.disabled = true;

            // Hiển thị bước hiện tại
            showStep(currentStep);

            // Bắt đầu chụp ảnh và xử lý
            await captureFaceAndSave(msv);
        }

        function showStep(stepIndex) {
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = "#e6f7ff"; // Màu nền xanh nhạt
            statusBox.style.color = "#1890ff"; // Màu chữ xanh
            statusBox.innerHTML = `
                <b>${stepIndex + 1}/${steps.length}: ${steps[stepIndex].label}</b>
                <div id="countdown" style="font-size: 16px; margin-top: 8px;"></div>
            `;
            startCountdown(stepIndex);
        }

        async function captureFaceAndSave(msv) {
            try {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                               .withFaceLandmarks()
                                               .withFaceDescriptor();

                if (!detection) {
                    showStatus("❌ Không thấy mặt. Hãy nhìn thẳng và thử lại!", false);
                    btnReg.disabled = false;
                    return;
                }

                registeredDescriptors.push(Array.from(detection.descriptor));

                if (currentStep < 2) {
                    currentStep++;
                    btnReg.disabled = false; // Bật lại nút
                    if (currentStep < steps.length) {
                        showStep(currentStep); // Chuyển sang bước tiếp theo
                    }
                } else {
                    saveAllData(msv);
                }
            } catch (error) {
                showStatus("❌ Lỗi khi nhận diện khuôn mặt: " + error.message, false);
                btnReg.disabled = false;
            }
        }

        function startCountdown(stepIndex) {
            let timeLeft = steps[stepIndex].duration;
            countdownElement.style.display = "block";
            countdownElement.innerHTML = `Thời gian còn lại: ${timeLeft}s`;

            const timer = setInterval(() => {
                timeLeft--;
                countdownElement.innerHTML = `Thời gian còn lại: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownElement.style.display = "none";
                    if (currentStep < 2) { // Tự động chuyển bước
                        btnReg.disabled = false;
                        registerDevice(); // Tự động chuyển sang bước tiếp theo
                    }
                }
            }, 1000); // 1 giây
        }

        function saveAllData(msv) {
            showStatus("⏳ Đang mã hóa và lưu dữ liệu...", true);
            let fingerprint = getDeviceFingerprint();
            let randomStr = Math.random().toString(36).substring(2, 15);
            let deviceToken = CryptoJS.SHA256(msv + randomStr + fingerprint).toString();

            let faceDataString = JSON.stringify(registeredDescriptors);
            let encryptedFaceData = CryptoJS.AES.encrypt(faceDataString, deviceToken).toString();

            localStorage.setItem("KHH_STUDENT_ID", msv);
            localStorage.setItem("KHH_DEVICE_TOKEN", deviceToken);
            localStorage.setItem("KHH_FACE_DATA", encryptedFaceData);

            fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`, {
                method: "PUT",
                body: JSON.stringify({ token: deviceToken, registered_at: new Date().toISOString() })
            })
            .then(() => {
                showStatus("✅ ĐĂNG KÝ THÀNH CÔNG! Đã lưu 3 góc mặt.", true);
                btnReg.style.display = "none";
            });
        }

        // ==========================================
        // 3. XÓA THIẾT BỊ
        // ==========================================
        function removeDevice() {
            let savedMsv = localStorage.getItem("KHH_STUDENT_ID");
            if (!savedMsv) { showStatus("Máy chưa được liên kết.", false); return; }

            if (confirm(`Bạn có chắc chắn muốn XÓA quyền của [${savedMsv}]?`)) {
                showStatus("⏳ Đang xóa...", false);
                localStorage.removeItem("KHH_STUDENT_ID");
                localStorage.removeItem("KHH_DEVICE_TOKEN");
                localStorage.removeItem("KHH_FACE_DATA");
                let deviceApiUrl = `${FIREBASE_BASE_URL}/devices/${savedMsv}.json`;
                fetch(deviceApiUrl, { method: "DELETE" })
                .then(() => { showStatus("✅ Đã thu hồi quyền!", false); document.location.reload(); })
                .catch(() => { showStatus("❌ Lỗi khi xóa trên máy chủ!", false); });
            }
        }

        // ==========================================
        // 4. TẠO FINGERPRINT THIẾT BỊ
        // ==========================================
        function getDeviceFingerprint() {
            let fp = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
            return CryptoJS.MD5(fp).toString();
        }
    </script>
</body>
</html>
