<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Sinh Trắc Học Thiết Bị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; min-height: 300px; display: none; flex-direction: column; justify-content: center; }
        
        #camera-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto 20px auto; border-radius: 15px; overflow: hidden; border: 3px solid #ccc; background: #000; display: none; }
        #video { width: 100%; display: block; transform: scaleX(-1); }
        #cam-instruction { position: absolute; top: 15px; left: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; z-index: 10; }
        #face-mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 260px; border: 3px solid #28a745; border-radius: 50% / 40%; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4); pointer-events: none; z-index: 5; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: #28a745; } 50% { border-color: #5eff8b; } 100% { border-color: #28a745; } }
        input { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 14px; font-size: 16px; width: 90%; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #btn-reg { background: #007bff; color: white; display: none; }
        .btn-remove { background: #6c757d; color: white; opacity: 0.7; }
        #status-box { margin-top: 15px; padding: 20px; border-radius: 10px; display: none; line-height: 1.6; }
        .success-msg { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .progress-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #007bff; transform: scale(1.3); }
        .dot.done { background: #28a745; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH KHÓA -->
    <div id="faculty-lock-screen" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
        <h2 style="color: #007bff;">🔐 XÁC THỰC GIÁO VỤ</h2>
        <p style="text-align: center;">Vui lòng quét mã QR tại máy tính Văn phòng Khoa để mở khóa tính năng đăng ký.</p>
        <div id="setup-reader" style="width: 100%; max-width: 350px; border: 5px solid #333; border-radius: 15px; overflow: hidden;"></div>
        <div id="lock-status" style="margin-top: 20px; color: red; font-weight: bold;"></div>
    </div>

    <!-- UI ĐĂNG KÝ (ẨN LÚC ĐẦU) -->
    <div class="container" id="main-container">
        <div id="setup-ui">
            <h2 style="margin-top:0; color:#007bff;">🔧 ĐĂNG KÝ THIẾT BỊ</h2>
            <div id="ai-loading" style="color:#ff9800; font-weight:bold; margin-bottom:15px;">⏳ Đang khởi tạo AI mặt...</div>
            
            <div class="progress-dots">
                <div id="dot0" class="dot"></div>
                <div id="dot1" class="dot"></div>
                <div id="dot2" class="dot"></div>
            </div>

            <div id="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div id="cam-instruction">Sẵn sàng</div>
                <div id="face-mask"></div>
            </div>

            <input type="text" id="studentId" placeholder="Nhập Mã Sinh Viên (VD: SV001)">
            <button id="btn-reg" onclick="handleRegistration()">📸 Bắt đầu chụp mặt</button>
            <button class="btn-remove" onclick="removeDevice()">🗑️ Hủy liên kết máy này</button>
        </div>
        <div id="status-box"></div>
    </div>

    <script>
        const SECRET_KEY = "HàngHải2026@Secure"; 
        const FB_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app"; 
        let html5QrcodeScanner;
        let registeredDescriptors = [];
        let currentStep = 0;
        const steps = ["Nhìn THẲNG", "Nghiêng đầu sang TRÁI", "Nghiêng đầu sang PHẢI"];

        // 1. KHỞI TẠO QUÉT MÃ KHOA
        window.addEventListener('load', () => {
            html5QrcodeScanner = new Html5Qrcode("setup-reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: 250 },
                (text) => verifyFacultyToken(text)
            ).catch(e => document.getElementById("lock-status").innerText = "Lỗi Camera sau!");
        });

        // 2. XÁC THỰC MÃ KHOA
        function verifyFacultyToken(scannedToken) {
            const timeBlock = Math.floor(Date.now() / 15000);
            const check = (b) => CryptoJS.HmacSHA256(`FACULTY_ACCESS_${b}`, SECRET_KEY).toString();

            if (scannedToken === check(timeBlock) || scannedToken === check(timeBlock - 1)) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById("faculty-lock-screen").style.display = "none";
                    document.getElementById("main-container").style.display = "flex";
                    initFaceRegistration(); // Chạy bước tiếp theo
                });
            } else {
                document.getElementById("lock-status").innerText = "❌ Mã không hợp lệ!";
            }
        }

        // 3. TẢI AI VÀ MỞ CAMERA TRƯỚC
        async function initFaceRegistration() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('./models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('./models')
                ]);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById("video").srcObject = stream;
                document.getElementById("camera-container").style.display = "block";
                document.getElementById("ai-loading").style.display = "none";
                document.getElementById("btn-reg").style.display = "inline-block";
            } catch (e) {
                alert("Lỗi tải AI hoặc Camera trước!");
            }
        }

        // 4. LOGIC ĐĂNG KÝ MẶT (Giữ nguyên của bạn)
        async function handleRegistration() {
            let msv = document.getElementById("studentId").value.trim().toUpperCase();
            if(!msv) { alert("Nhập Mã SV!"); return; }

            if (currentStep === 0) {
                document.getElementById("btn-reg").disabled = true;
                const check = await fetch(`${FB_URL}/devices/${msv}.json`).then(r => r.json());
                if (check && check.token) {
                    alert("Mã SV này đã đăng ký trên máy khác!");
                    document.getElementById("btn-reg").disabled = false;
                    return;
                }
            }
            startCapture(msv);
        }

        async function startCapture(msv) {
            document.getElementById("btn-reg").disabled = true;
            document.getElementById("cam-instruction").innerHTML = `Bước ${currentStep + 1}/3: <br>${steps[currentStep]}`;
            document.getElementById(`dot${currentStep}`).classList.add("active");

            await new Promise(r => setTimeout(r, 1000));
            const detection = await faceapi.detectSingleFace(document.getElementById("video"), new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                document.getElementById("cam-instruction").innerText = "⚠️ Thử lại!";
                document.getElementById("btn-reg").disabled = false;
                return;
            }

            registeredDescriptors.push(Array.from(detection.descriptor));
            document.getElementById(`dot${currentStep}`).className = "dot done";

            if (currentStep < 2) {
                currentStep++;
                document.getElementById("btn-reg").disabled = false;
                document.getElementById("btn-reg").innerText = "📸 Góc tiếp theo";
            } else {
                saveData(msv);
            }
        }

        async function saveData(msv) {
            document.getElementById("cam-instruction").innerText = "💾 Lưu dữ liệu...";
            const token = CryptoJS.SHA256(msv + Math.random()).toString();
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(registeredDescriptors), token).toString();

            localStorage.setItem("KHH_STUDENT_ID", msv);
            localStorage.setItem("KHH_DEVICE_TOKEN", token);
            localStorage.setItem("KHH_FACE_DATA", encrypted);

            await fetch(`${FB_URL}/devices/${msv}.json`, {
                method: "PUT",
                body: JSON.stringify({ token: token, registered_at: new Date().toLocaleString() })
            });

            document.getElementById("setup-ui").style.display = "none";
            const box = document.getElementById("status-box");
            box.style.display = "block";
            box.className = "success-msg";
            box.innerHTML = `<h2>🎉 THÀNH CÔNG!</h2><p>Đã liên kết thiết bị cho SV: ${msv}</p><button onclick="location.href='index.html'">ĐIỂM DANH NGAY</button>`;
        }

        function removeDevice() {
            let msv = localStorage.getItem("KHH_STUDENT_ID");
            if (msv && confirm("Xóa liên kết máy này?")) {
                fetch(`${FB_URL}/devices/${msv}.json`, { method: "DELETE" }).then(() => {
                    localStorage.clear();
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
