<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Sinh Trắc Học Thiết Bị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        
        /* Camera Container */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ccc;
            background: #000;
            display: none;
        }

        #video { width: 100%; display: block; transform: scaleX(-1); }

        #cam-instruction {
            position: absolute;
            top: 15px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
        }

        #face-mask {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; 
            height: 260px;
            border: 3px solid #28a745;
            border-radius: 50% / 40%;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { border-color: #28a745; box-shadow: 0 0 5px #28a745, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
            50% { border-color: #5eff8b; box-shadow: 0 0 20px #5eff8b, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
            100% { border-color: #28a745; box-shadow: 0 0 5px #28a745, 0 0 0 1000px rgba(0, 0, 0, 0.4); }
        }

        input { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { padding: 14px; font-size: 16px; width: 90%; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #btn-reg { background: #007bff; color: white; display: none; }
        #btn-reg:disabled { background: #6c757d; cursor: not-allowed; }
        
        .btn-remove { background: #6c757d; color: white; opacity: 0.7; }

        #status-box { margin-top: 15px; padding: 20px; border-radius: 10px; display: none; line-height: 1.6; }
        .success-msg { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error-msg { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .progress-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #007bff; transform: scale(1.3); }
        .dot.done { background: #28a745; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div id="setup-ui">
            <h2 style="margin-top:0; color:#007bff;">🔧 ĐĂNG KÝ THIẾT BỊ</h2>
            <div id="ai-loading" style="color:#ff9800; font-weight:bold; margin-bottom:15px;">⏳ Đang khởi tạo AI...</div>
            
            <div class="progress-dots" id="dots-container">
                <div id="dot0" class="dot"></div>
                <div id="dot1" class="dot"></div>
                <div id="dot2" class="dot"></div>
            </div>

            <div id="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div id="cam-instruction">Sẵn sàng</div>
                <div id="face-mask"></div>
            </div>

            <input type="text" id="studentId" placeholder="Nhập Mã Sinh Viên (VD: SV001)">
            <button id="btn-reg" onclick="handleRegistration()">📸 Bắt đầu chụp mặt</button>
            <button id="btn-del" class="btn-remove" onclick="removeDevice()">🗑️ Hủy liên kết máy này</button>
        </div>

        <div id="status-box"></div>
    </div>

    <script>
        const statusBox = document.getElementById("status-box");
        const video = document.getElementById("video");
        const btnReg = document.getElementById("btn-reg");
        const camInstruction = document.getElementById("cam-instruction");
        const camContainer = document.getElementById("camera-container");
        const setupUI = document.getElementById("setup-ui");

        const FIREBASE_BASE_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app"; 

        let registeredDescriptors = [];
        let currentStep = 0;
        const steps = ["Nhìn THẲNG", "Nghiêng đầu sang TRÁI", "Nghiêng đầu sang PHẢI"];

        window.onload = async () => {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('./models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('./models')
                ]);
                startSetupCamera();
            } catch (error) {
                document.getElementById("ai-loading").innerHTML = "❌ Lỗi tải AI";
            }
        };

        async function startSetupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                camContainer.style.display = "block";
                document.getElementById("ai-loading").style.display = "none";
                btnReg.style.display = "inline-block";
            } catch (err) {
                alert("Lỗi Camera!");
            }
        }

        async function handleRegistration() {
            let msv = document.getElementById("studentId").value.trim().toUpperCase();
            if(!msv) { alert("Vui lòng nhập Mã SV!"); return; }

            if (currentStep === 0) {
                btnReg.disabled = true;
                const check = await fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`).then(r => r.json());
                if (check && check.token) {
                    alert("Mã SV này đã được đăng ký trên thiết bị khác!");
                    btnReg.disabled = false;
                    return;
                }
            }
            startCaptureProcess(msv);
        }

        async function startCaptureProcess(msv) {
            btnReg.disabled = true;
            camInstruction.innerHTML = `Bước ${currentStep + 1}/3: <br>${steps[currentStep]}`;
            document.getElementById(`dot${currentStep}`).classList.add("active");

            await new Promise(r => setTimeout(r, 1000));

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                                           .withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                camInstruction.innerText = "⚠️ Không thấy mặt, hãy thử lại!";
                btnReg.disabled = false;
                return;
            }

            registeredDescriptors.push(Array.from(detection.descriptor));
            document.getElementById(`dot${currentStep}`).className = "dot done";

            if (currentStep < 2) {
                currentStep++;
                btnReg.disabled = false;
                btnReg.innerText = "📸 Chụp góc tiếp theo";
                camInstruction.innerText = "Tốt! Hãy chụp góc tiếp theo";
            } else {
                saveAllData(msv);
            }
        }

        async function saveAllData(msv) {
            camInstruction.innerText = "💾 Đang lưu...";
            try {
                let fingerprint = navigator.userAgent + screen.width;
                let deviceHash = CryptoJS.MD5(fingerprint).toString();
                let deviceToken = CryptoJS.SHA256(msv + Math.random() + deviceHash).toString();
                let encryptedFaceData = CryptoJS.AES.encrypt(JSON.stringify(registeredDescriptors), deviceToken).toString();

                localStorage.setItem("KHH_STUDENT_ID", msv);
                localStorage.setItem("KHH_DEVICE_TOKEN", deviceToken);
                localStorage.setItem("KHH_FACE_DATA", encryptedFaceData);

                await fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`, {
                    method: "PUT",
                    body: JSON.stringify({ token: deviceToken, registered_at: new Date().toLocaleString() })
                });

                finishSuccess(msv);
            } catch (e) { alert("Lỗi lưu dữ liệu!"); }
        }

        function finishSuccess(msv) {
            // 1. Tắt camera
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            // 2. Ẩn toàn bộ UI đăng ký
            setupUI.style.display = "none";

            // 3. Hiển thị thông báo thành công
            statusBox.style.display = "block";
            statusBox.className = "success-msg";
            statusBox.innerHTML = `
                <div style="font-size: 18px;">
                    <h2 style="color: #28a745; margin-top:0;">🎉 ĐĂNG KÝ THÀNH CÔNG!</h2>
                    <p>Chào sinh viên: <b>${msv}</b></p>
                    <p>Thiết bị của bạn đã được liên kết hệ thống thành công.</p>
                    <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 20px 0;">
                    <button onclick="window.location.href='index.html'" 
                        style="background: #28a745; color: white; width: 100%; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer;">
                        ĐẾN TRANG ĐIỂM DANH NGAY
                    </button>
                    <p style="font-size: 13px; color: #666; margin-top: 15px;">
                        Tự động chuyển hướng sau <span id="timer" style="font-weight:bold; color:red;">5</span> giây...
                    </p>
                </div>
            `;

            // 4. Đếm ngược chuyển hướng
            let count = 5;
            const countdown = setInterval(() => {
                count--;
                document.getElementById("timer").innerText = count;
                if (count <= 0) {
                    clearInterval(countdown);
                    window.location.href = "index.html";
                }
            }, 1000);
        }

        function removeDevice() {
            let msv = localStorage.getItem("KHH_STUDENT_ID");
            if (!msv) return alert("Không có dữ liệu!");
            if (confirm("Xóa dữ liệu máy này?")) {
                fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`, { method: "DELETE" }).then(() => {
                    localStorage.clear();
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
