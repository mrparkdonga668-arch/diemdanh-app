<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý & Sinh Trắc Học Thiết Bị</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #e9ecef; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        #video { width: 100%; border-radius: 10px; border: 3px solid #ccc; margin-bottom: 15px; display: none; transform: scaleX(-1); }
        .video-active { border-color: #007bff !important; }

        input { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { padding: 12px; font-size: 16px; width: 90%; margin-bottom: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #btn-reg { background: #007bff; color: white; display: none; }
        #btn-reg:disabled { background: #6c757d; cursor: not-allowed; }
        
        .btn-remove { background: #dc3545; color: white; margin-top: 10px; }

        #status-box { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; font-size: 14px; line-height: 1.6; border: 1px solid transparent; }
        #ai-loading { color: #ff9800; font-weight: bold; margin-bottom: 15px; }
        
        .progress-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #007bff; transform: scale(1.2); }
        .dot.done { background: #28a745; }

        .error-msg { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .success-msg { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .info-msg { background-color: #e2f3f5; color: #0c5460; border-color: #bee5eb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔧 ĐĂNG KÝ THIẾT BỊ</h2>
        <p style="color: #666; font-size: 13px;">Hệ thống nhận diện 1 sinh viên - 1 thiết bị</p>
        
        <div id="ai-loading">⏳ Đang tải AI nhận diện khuôn mặt...</div>
        
        <div class="progress-dots">
            <div id="dot0" class="dot"></div>
            <div id="dot1" class="dot"></div>
            <div id="dot2" class="dot"></div>
        </div>

        <video id="video" autoplay muted playsinline></video>

        <input type="text" id="studentId" placeholder="Nhập Mã Sinh Viên (VD: SV001)">
        
        <button id="btn-reg" onclick="handleRegistration()">📸 Bắt đầu chụp mặt</button>
        <button class="btn-remove" onclick="removeDevice()">🗑️ Hủy liên kết máy này</button>

        <div id="status-box"></div>
    </div>

    <script>
        const statusBox = document.getElementById("status-box");
        const video = document.getElementById("video");
        const btnReg = document.getElementById("btn-reg");
        const aiLoading = document.getElementById("ai-loading");

        const FIREBASE_BASE_URL = "https://hanghai-6f86f-default-rtdb.asia-southeast1.firebasedatabase.app"; 

        let registeredDescriptors = [];
        let currentStep = 0;
        const steps = [
            "Nhìn THẲNG vào camera",
            "Quay mặt sang TRÁI một chút",
            "Quay mặt sang PHẢI một chút"
        ];

        window.onload = async () => {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('./models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('./models')
                ]);
                startSetupCamera();
            } catch (error) {
                aiLoading.innerHTML = "❌ Lỗi: Không thể tải AI";
            }
        };

        async function startSetupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.style.display = "block";
                aiLoading.style.display = "none";
                btnReg.style.display = "inline-block";
            } catch (err) {
                aiLoading.innerHTML = "❌ Lỗi: Không thể mở Camera!";
            }
        }

        function showStatus(message, type) {
            statusBox.style.display = "block";
            statusBox.className = ""; // Reset class
            statusBox.classList.add(type === 'success' ? "success-msg" : (type === 'info' ? "info-msg" : "error-msg"));
            statusBox.innerHTML = message;
        }

        // --- HÀM XỬ LÝ CHÍNH VỚI 2 LỚP BẢO VỆ ---
        async function handleRegistration() {
            let msv = document.getElementById("studentId").value.trim().toUpperCase();
            if(!msv) { alert("Vui lòng nhập Mã sinh viên!"); return; }

            // Nếu đang trong quá trình chụp thì tiếp tục
            if (currentStep > 0) {
                startCaptureProcess(msv);
                return;
            }

            // LỚP 1: Kiểm tra xem trình duyệt này đã có ai đăng ký chưa
            let localStoredMsv = localStorage.getItem("KHH_STUDENT_ID");
            if (localStoredMsv) {
                showStatus(
                    `⚠️ <b>THIẾT BỊ ĐÃ ĐƯỢC ĐĂNG KÝ!</b><br>` +
                    `Máy này hiện đang liên kết với sinh viên: <b>${localStoredMsv}</b>.<br>` +
                    `Bạn phải bấm nút <b>"Hủy liên kết máy này"</b> bên dưới để xóa dữ liệu cũ trước khi đăng ký cho sinh viên mới.`, 
                    'error'
                );
                return;
            }

            btnReg.disabled = true;
            showStatus("⏳ Đang kiểm tra mã sinh viên trên hệ thống...", 'info');

            try {
                // LỚP 2: Kiểm tra xem MSV này đã có thiết bị nào đăng ký trên Firebase chưa
                const checkResponse = await fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`);
                const existingData = await checkResponse.json();

                // Chỉ báo lỗi tồn tại nếu dữ liệu trả về có chứa thuộc tính 'token' thực sự
                if (existingData && existingData.token) {
                    showStatus(
                        `❌ <b>MÃ SINH VIÊN ĐÃ TỒN TẠI!</b><br>` +
                        `Sinh viên <b>${msv}</b> đã đăng ký thiết bị khác trên hệ thống.`, 
                        'error'
                    );
                    btnReg.disabled = false;
                    return;
                }

                // Nếu Firebase trả về lỗi Permission Denied
                if (existingData && existingData.error) {
                    showStatus(`❌ Lỗi hệ thống: ${existingData.error}. Hãy kiểm tra Firebase Rules!`, 'error');
                    btnReg.disabled = false;
                    return;
                }

                // Nếu cả 2 điều kiện đều thỏa mãn thì bắt đầu chụp
                startCaptureProcess(msv);

            } catch (error) {
                console.error(error);
                showStatus("❌ Lỗi kết nối hệ thống. Vui lòng thử lại.", 'error');
                btnReg.disabled = false;
            }
        }

        async function startCaptureProcess(msv) {
            btnReg.disabled = true;
            video.classList.add("video-active");

            showStatus(`<b>Bước ${currentStep + 1}/3:</b> ${steps[currentStep]}<br>⏳ Đang phân tích khuôn mặt...`, 'info');
            document.getElementById(`dot${currentStep}`).classList.add("active");

            await new Promise(resolve => setTimeout(resolve, 600));

            try {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.1 }))
                                               .withFaceLandmarks()
                                               .withFaceDescriptor();
                
                if (!detection) {
                    showStatus(`❌ <b>Không thấy mặt!</b><br>Đảm bảo đủ ánh sáng và nhìn vào camera.`, 'error');
                    btnReg.disabled = false;
                    btnReg.innerText = "📸 Thử lại góc này";
                    video.classList.remove("video-active");
                    return;
                }

                registeredDescriptors.push(Array.from(detection.descriptor));
                document.getElementById(`dot${currentStep}`).classList.remove("active");
                document.getElementById(`dot${currentStep}`).classList.add("done");

                if (currentStep < 2) {
                    currentStep++;
                    showStatus(`✅ Đã ghi nhận góc ${currentStep}.<br><b>Tiếp theo:</b> ${steps[currentStep]}`, 'success');
                    btnReg.disabled = false;
                    btnReg.innerText = "📸 Chụp tiếp";
                } else {
                    saveAllData(msv);
                }
            } catch (err) {
                showStatus("❌ Lỗi: " + err.message, 'error');
                btnReg.disabled = false;
            }
            video.classList.remove("video-active");
        }

        async function saveAllData(msv) {
            showStatus("⏳ Đang bảo mật dữ liệu...", 'info');
            btnReg.innerText = "Đang lưu...";

            try {
                let fingerprint = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
                let deviceHash = CryptoJS.MD5(fingerprint).toString();
                let randomStr = Math.random().toString(36).substring(2, 10);
                let deviceToken = CryptoJS.SHA256(msv + randomStr + deviceHash).toString();

                let faceDataString = JSON.stringify(registeredDescriptors);
                let encryptedFaceData = CryptoJS.AES.encrypt(faceDataString, deviceToken).toString();

                localStorage.setItem("KHH_STUDENT_ID", msv);
                localStorage.setItem("KHH_DEVICE_TOKEN", deviceToken);
                localStorage.setItem("KHH_FACE_DATA", encryptedFaceData);

                const response = await fetch(`${FIREBASE_BASE_URL}/devices/${msv}.json`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        token: deviceToken,
                        registered_at: new Date().toLocaleString("vi-VN")
                    })
                });

                if(response.ok) {
                    showStatus(`<b>✅ ĐĂNG KÝ THÀNH CÔNG!</b><br>Đã liên kết MSV <b>${msv}</b> với thiết bị này.`, 'success');
                    btnReg.style.display = "none";
                } else {
                    throw new Error("Lỗi Server");
                }
            } catch (error) {
                showStatus("⚠️ Lỗi khi lưu lên Server nhưng đã lưu cục bộ.", 'error');
            }
        }

        function removeDevice() {
            let savedMsv = localStorage.getItem("KHH_STUDENT_ID");
            if (!savedMsv) {
                alert("Máy này hiện chưa có dữ liệu đăng ký nào.");
                return;
            }

            if (confirm(`HÀNH ĐỘNG NÀY SẼ:\n1. Xóa dữ liệu sinh viên [${savedMsv}] trên máy này.\n2. Hủy liên kết trên hệ thống.\n\nBạn chắc chắn muốn thực hiện?`)) {
                let deviceApiUrl = `${FIREBASE_BASE_URL}/devices/${savedMsv}.json`;
                fetch(deviceApiUrl, { method: "DELETE" }).then(() => {
                    localStorage.clear();
                    alert("Đã xóa dữ liệu thành công. Trang sẽ tải lại.");
                    location.reload();
                }).catch(err => {
                    alert("Lỗi khi xóa dữ liệu trên Server. Hãy thử lại.");
                });
            }
        }
    </script>
</body>
</html>
